seed: 42
dry_run: true

dataset:
  root: "/Volumes/satechi/ml_projects/cifar"
  num_workers: 0
  pin_memory: false

data_augmentations:
  h_flip_prob: 0.5
  rotate_range: [-5.0, 5.0]
  crop_padding: 2
  mixup_alpha: 0.3

training:
  learning_rate: 0.005
  batch_size: 256
  early_stopping_patience: 20
  scheduler_patience: 5
  scheduler_factor: 0.5
  num_epochs: 200
  weight_decay: 0.005

  early_stopping: true
  use_profiler: false

model:
  stem:
    conv:
      out_channels: 64
      kernel_size: 3
      padding: 1
      stride: 1
    maxpool:
      kernel_size: 3
      stride: 2
      padding: 1
  layers:
    - out_channels: 64
      kernel_size: 3
      padding: 1
      stride: 1
      blocks: 3
    - out_channels: 128
      kernel_size: 3
      padding: 1
      stride: 2
      blocks: 2
    - out_channels: 256
      kernel_size: 3
      padding: 1
      stride: 2
      blocks: 2
    # - out_channels: 512
    #   kernel_size: 3
    #   padding: 1
    #   stride: 2
    #   blocks: 2
  fc: 256